name: Release - Main Push

on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: read
  packages: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract_version.outputs.version }}
      tag_name: ${{ steps.create_tag.outputs.tag_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from commit message
        id: extract_version
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B | head -n1)
          VERSION_PART=$(echo "$COMMIT_MSG" | cut -d' ' -f1)
          if echo "$VERSION_PART" | grep -q '^[0-9]\+\.[0-9]\+\.[0-9]\+$'; then
            echo "version=$VERSION_PART" >> "$GITHUB_OUTPUT"
          else
            echo "Commit message does not start with a semantic version. Skipping tag creation."
          fi

      - name: Create tag
        if: ${{ steps.extract_version.outputs.version != '' }}
        id: create_tag
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          TAG_NAME="releases/${VERSION}"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

  create-release:
    needs: tag
    if: ${{ needs.tag.outputs.version != '' }}
    uses: ./.github/workflows/release-create-github.yml
    with:
      version: ${{ needs.tag.outputs.version }}
      tag_name: ${{ needs.tag.outputs.tag_name }}
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  trigger-ui-build:
    needs: [tag, create-release]
    if: ${{ always() && needs.tag.outputs.version != '' }}
    uses: ./.github/workflows/release-ui-build.yml
    with:
      version: ${{ needs.tag.outputs.version }}
      is_prerelease: "false"
    secrets:
      UI_BUILD_PAT: ${{ secrets.UI_BUILD_PAT }}

  publish:
    needs: [tag, create-release, trigger-ui-build]
    if: ${{ always() && needs.tag.outputs.version != '' && needs.trigger-ui-build.result == 'success' }}
    uses: ./.github/workflows/release-pypi-publish.yml
    with:
      branch: ${{ github.ref_name }}
      version: ${{ needs.tag.outputs.version }}
    secrets: inherit

  docker-publish:
    needs: [tag, publish]
    if: ${{ always() && needs.tag.outputs.version != '' && needs.publish.result == 'success' }}
    uses: ./.github/workflows/release-docker-publish.yml
    with:
      version: ${{ needs.tag.outputs.version }}
      is_prerelease: "false"
    secrets: inherit
