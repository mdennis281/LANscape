name: Chore - Wiki Sync

on:
  push:
    branches: [main]
    paths:
      - 'docs/library/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout wiki
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Flatten docs into wiki
        run: |
          # Clean existing wiki content (preserve _Sidebar, _Footer, Home if they exist)
          cd wiki
          find . -maxdepth 1 -name '*.md' ! -name '_Sidebar.md' ! -name '_Footer.md' ! -name 'Home.md' -delete
          cd ..

          DOCS="docs/library"

          # Map: source path -> wiki page name (flat, no subfolders)
          declare -A FILE_MAP

          # Root-level docs
          FILE_MAP["$DOCS/overview.md"]="Library-Overview"
          FILE_MAP["$DOCS/net-tools.md"]="net_tools"
          FILE_MAP["$DOCS/port-manager.md"]="PortManager"
          FILE_MAP["$DOCS/websocket-server.md"]="WebSocket-Server"

          # Scanner
          FILE_MAP["$DOCS/scanner/scan-manager.md"]="ScanManager"
          FILE_MAP["$DOCS/scanner/subnet-scanner.md"]="SubnetScanner"
          FILE_MAP["$DOCS/scanner/scanner-results.md"]="ScannerResults"

          # Config
          FILE_MAP["$DOCS/config/scan-config.md"]="ScanConfig"
          FILE_MAP["$DOCS/config/sub-configs.md"]="Sub-Configs"
          FILE_MAP["$DOCS/config/enums.md"]="Enums"

          # Models
          FILE_MAP["$DOCS/models/overview.md"]="Models"

          # Build reverse map: relative link target -> wiki page name
          # This handles all the cross-references between docs
          declare -A LINK_MAP
          LINK_MAP["scanner/scan-manager.md"]="ScanManager"
          LINK_MAP["scanner/subnet-scanner.md"]="SubnetScanner"
          LINK_MAP["scanner/scanner-results.md"]="ScannerResults"
          LINK_MAP["config/scan-config.md"]="ScanConfig"
          LINK_MAP["config/sub-configs.md"]="Sub-Configs"
          LINK_MAP["config/enums.md"]="Enums"
          LINK_MAP["models/overview.md"]="Models"
          LINK_MAP["port-manager.md"]="PortManager"
          LINK_MAP["net-tools.md"]="net_tools"
          LINK_MAP["overview.md"]="Library-Overview"
          LINK_MAP["websocket-server.md"]="WebSocket-Server"

          # Also handle relative links from subdirectories (../ prefixed)
          LINK_MAP["../config/scan-config.md"]="ScanConfig"
          LINK_MAP["../config/sub-configs.md"]="Sub-Configs"
          LINK_MAP["../config/enums.md"]="Enums"
          LINK_MAP["../models/overview.md"]="Models"
          LINK_MAP["../scanner/scan-manager.md"]="ScanManager"
          LINK_MAP["../scanner/subnet-scanner.md"]="SubnetScanner"
          LINK_MAP["../scanner/scanner-results.md"]="ScannerResults"
          LINK_MAP["../port-manager.md"]="PortManager"
          LINK_MAP["../net-tools.md"]="net_tools"
          LINK_MAP["../websocket-server.md"]="WebSocket-Server"

          # Same-directory links (no path prefix)
          LINK_MAP["scan-manager.md"]="ScanManager"
          LINK_MAP["subnet-scanner.md"]="SubnetScanner"
          LINK_MAP["scanner-results.md"]="ScannerResults"
          LINK_MAP["scan-config.md"]="ScanConfig"
          LINK_MAP["sub-configs.md"]="Sub-Configs"
          LINK_MAP["enums.md"]="Enums"

          # Copy and rewrite each file
          for src in "${!FILE_MAP[@]}"; do
            dest="wiki/${FILE_MAP[$src]}.md"
            cp "$src" "$dest"

            # Rewrite markdown links: [text](old-path.md) -> [text](Wiki-Page)
            # and [text](old-path.md#anchor) -> [text](Wiki-Page#anchor)
            for link_target in "${!LINK_MAP[@]}"; do
              wiki_page="${LINK_MAP[$link_target]}"
              # Escape dots and slashes for sed
              escaped_target=$(echo "$link_target" | sed 's/[.\/]/\\&/g')
              # Replace links with anchors: (path.md#anchor) -> (Wiki-Page#anchor)
              sed -i "s|]($escaped_target#|]($wiki_page#|g" "$dest"
              # Replace links without anchors: (path.md) -> (Wiki-Page)
              sed -i "s|]($escaped_target)|]($wiki_page)|g" "$dest"
            done
          done

          echo "Wiki pages generated:"
          ls -1 wiki/*.md

      - name: Generate home page
        run: |
          cat > wiki/Home.md << 'EOF'
          # LANscape Wiki

          LANscape is a Python library for scanning your local network — discovering devices, testing ports, and identifying services.

          ```bash
          pip install lanscape
          ```

          ```python
          from lanscape import ScanManager, ScanConfig, net_tools

          sm = ScanManager()
          subnet = net_tools.smart_select_primary_subnet()

          config = ScanConfig(subnet=subnet, port_list="medium")
          scan = sm.new_scan(config)
          sm.wait_until_complete(scan.uid)

          for device in scan.results.to_results().devices:
              print(f"{device.ip} - {device.hostname} - Ports: {device.ports}")
          ```

          ## 📖 Documentation

          | Topic | Description |
          |-------|-------------|
          | **[Library Overview](Library-Overview)** | Full guide — architecture, presets, and examples |
          | **[ScanManager](ScanManager)** | Create, track, and terminate scans |
          | **[SubnetScanner](SubnetScanner)** | The scan engine under the hood |
          | **[ScannerResults](ScannerResults)** | Export results as structured data or summaries |
          | **[ScanConfig](ScanConfig)** | Configure subnets, ports, threads, and strategies |
          | **[Sub-Configs](Sub-Configs)** | Fine-tune Ping, ARP, Poke, Port, and Service scanning |
          | **[Enums](Enums)** | `ScanType`, `ServiceScanStrategy`, and other enumerations |
          | **[Models](Models)** | Pydantic models — `DeviceResult`, `ScanResults`, etc. |
          | **[PortManager](PortManager)** | CRUD operations for port lists |
          | **[net_tools](net_tools)** | Subnet detection, ARP support, and network helpers |
          | **[WebSocket Server](WebSocket-Server)** | Real-time WebSocket API — protocol, actions, events |

          ---
          *Auto-synced from [`docs/library`](https://github.com/mdennis281/LANscape/tree/main/docs/library)*
          EOF

      - name: Generate sidebar
        run: |
          cat > wiki/_Sidebar.md << 'EOF'
          ### 📖 Library Documentation

          **[Overview](Library-Overview)**

          **Scanning**
          - [ScanManager](ScanManager)
          - [SubnetScanner](SubnetScanner)
          - [ScannerResults](ScannerResults)

          **Configuration**
          - [ScanConfig](ScanConfig)
          - [Sub-Configs](Sub-Configs)
          - [Enums](Enums)

          **Reference**
          - [Models](Models)
          - [PortManager](PortManager)
          - [net_tools](net_tools)
          - [WebSocket Server](WebSocket-Server)
          EOF

      - name: Push to wiki
        run: |
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes to push"
          else
            git commit -m "Sync library docs from main @ $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
            echo "Wiki updated successfully"
          fi
