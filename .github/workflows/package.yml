name: Release Trigger - Tag Push

on:
  push:
    tags:
      - 'releases/*'
      - 'pre-releases/*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version to tag and release (e.g. v1.2.3, v1.2.0a1)"
        required: true
        type: string
      ui_branch:
        description: "The lanscape-ui branch to build from (default: main)"
        required: false
        type: string
        default: "main"

permissions:
  contents: write
  actions: read
  packages: write
  id-token: write
  attestations: write

jobs:
  create-tag:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.resolve.outputs.tag_name }}
      tag_ref: ${{ steps.resolve.outputs.tag_ref }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve or create tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            if [[ "$VERSION" == *a* || "$VERSION" == *b* || "$VERSION" == *rc* ]]; then
              TAG="pre-releases/$VERSION"
            else
              TAG="releases/$VERSION"
            fi
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
            echo "Tag $TAG created and pushed"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag_ref=refs/tags/$TAG" >> "$GITHUB_OUTPUT"

  determine-release:
    needs: [create-tag]
    runs-on: ubuntu-latest
    outputs:
      should_create_release: ${{ steps.check_conditions.outputs.should_create_release }}
      should_publish: ${{ steps.check_conditions.outputs.should_publish }}
      clean_version: ${{ steps.extract_version.outputs.clean_version }}
      is_prerelease: ${{ steps.check_conditions.outputs.is_prerelease }}
    steps:
      - name: Extract version from tag
        id: extract_version
        run: |
          TAG_NAME="${{ needs.create-tag.outputs.tag_name }}"
          echo "Processing tag: $TAG_NAME"
          
          # Remove prefix to get clean version
          CLEAN_VERSION="${TAG_NAME#releases/}"
          CLEAN_VERSION="${CLEAN_VERSION#pre-releases/}"
          
          echo "clean_version=$CLEAN_VERSION" >> "$GITHUB_OUTPUT"
          echo "Clean version: $CLEAN_VERSION"

      - name: Check release conditions
        id: check_conditions
        run: |
          TAG_NAME="${{ needs.create-tag.outputs.tag_name }}"
          CLEAN_VERSION="${{ steps.extract_version.outputs.clean_version }}"
          
          echo "Checking conditions for tag: $TAG_NAME"
          
          # Check if it's a proper release
          if [[ "$TAG_NAME" == releases/* ]]; then
            echo "✓ Proper release detected"
            echo "should_create_release=true" >> "$GITHUB_OUTPUT"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          # Check if it's an RC release (pre-releases/* with 'rc' in version)
          elif [[ "$TAG_NAME" == pre-releases/* ]] && [[ "$CLEAN_VERSION" == *"rc"* ]]; then
            echo "✓ Release candidate detected"
            echo "should_create_release=true" >> "$GITHUB_OUTPUT"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          # Check if it's a beta release (pre-releases/* with 'b' in version)
          elif [[ "$TAG_NAME" == pre-releases/* ]] && [[ "$CLEAN_VERSION" == *"b"* ]]; then
            echo "✓ Beta release detected"
            echo "should_create_release=false" >> "$GITHUB_OUTPUT"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          # Check if it's an alpha release (pre-releases/* with 'a' in version)
          elif [[ "$TAG_NAME" == pre-releases/* ]] && [[ "$CLEAN_VERSION" == *"a"* ]]; then
            echo "✓ Alpha release detected - publish only, no GitHub release"
            echo "should_create_release=false" >> "$GITHUB_OUTPUT"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "✗ Conditions not met for release creation or publishing"
            echo "should_create_release=false" >> "$GITHUB_OUTPUT"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  create-release:
    needs: [create-tag, determine-release]
    if: ${{ needs.determine-release.outputs.should_create_release == 'true' }}
    uses: ./.github/workflows/create-release.yml
    with:
      version: ${{ needs.determine-release.outputs.clean_version }}
      tag_name: ${{ needs.create-tag.outputs.tag_name }}
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  publish:
    needs: [create-tag, determine-release, create-release, trigger-ui-build]
    if: ${{ always() && needs.determine-release.outputs.should_publish == 'true' && needs.trigger-ui-build.result == 'success' }}
    uses: ./.github/workflows/pypi-publish.yml
    with:
      branch: ${{ needs.create-tag.outputs.tag_ref }}
      version: ${{ needs.determine-release.outputs.clean_version }}
    secrets: inherit

  trigger-ui-build:
    needs: [create-tag, determine-release, create-release]
    if: ${{ always() && needs.determine-release.outputs.should_publish == 'true' }}
    uses: ./.github/workflows/trigger-ui-build.yml
    with:
      version: ${{ needs.determine-release.outputs.clean_version }}
      is_prerelease: ${{ needs.determine-release.outputs.is_prerelease }}
      ui_branch: ${{ inputs.ui_branch || 'main' }}
    secrets:
      UI_BUILD_PAT: ${{ secrets.UI_BUILD_PAT }}

  docker-publish:
    needs: [create-tag, determine-release, create-release, trigger-ui-build]
    if: ${{ always() && needs.determine-release.outputs.should_publish == 'true' && needs.trigger-ui-build.result == 'success' }}
    uses: ./.github/workflows/docker-publish.yml
    with:
      version: ${{ needs.determine-release.outputs.clean_version }}
      is_prerelease: ${{ needs.determine-release.outputs.is_prerelease }}
    secrets: inherit
