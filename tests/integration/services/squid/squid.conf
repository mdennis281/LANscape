# Squid proxy for LANscape integration testing
# Minimal config — accepts connections on port 3128

http_port 3128

# Allow connections from the test network only
acl testnet src 172.30.0.0/24
acl testnet src fd00:dead:beef::/64
http_access allow testnet

# Deny everything else
http_access deny all

# Minimal logging
access_log none
cache_log /dev/null
