# HTTP on port 80
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location / {
        return 200 'LANscape Test Web Server\n';
        add_header Content-Type text/plain;
    }

    location /health {
        return 200 'ok';
    }
}

# HTTPS on port 443 (self-signed cert)
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    location / {
        return 200 'LANscape Test Web Server (HTTPS)\n';
        add_header Content-Type text/plain;
    }
}

# HTTP alt on port 8080
server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    location / {
        return 200 'LANscape Test Web Server (Alt)\n';
        add_header Content-Type text/plain;
    }
}
