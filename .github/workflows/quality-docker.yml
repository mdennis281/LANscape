name: Quality - Docker Build

on:
  pull_request:
    branches:
      - main
    paths:
      - 'docker/**'
      - '.github/workflows/quality-docker.yml'
      - '.dockerignore'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build AMD64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: lanscape:test
          cache-from: type=gha,scope=test-amd64
          cache-to: type=gha,mode=max,scope=test-amd64

      - name: Verify image starts
        run: |
          docker run -d --name lanscape-test -p 5001:5001 -p 8766:8766 lanscape:test
          echo "Waiting for container to start..."
          sleep 10
          docker logs lanscape-test
          docker ps --filter name=lanscape-test --format "{{.Status}}" | grep -q "Up" || \
            (echo "Container is not running"; docker logs lanscape-test; exit 1)
          echo "Container started successfully"
          docker stop lanscape-test

  build-arm64:
    runs-on: ubuntu-24.04-arm  # Native ARM64 runner (no QEMU)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.arm64
          platforms: linux/arm64
          push: false
          load: true
          tags: lanscape-arm:test
          cache-from: type=gha,scope=test-arm64
          cache-to: type=gha,mode=max,scope=test-arm64

      - name: Verify ARM64 image starts
        run: |
          docker run -d --name lanscape-arm-test -p 5001:5001 -p 8766:8766 lanscape-arm:test
          echo "Waiting for ARM64 container to start..."
          sleep 20
          docker logs lanscape-arm-test
          docker ps --filter name=lanscape-arm-test --format "{{.Status}}" | grep -q "Up" || \
            (echo "ARM64 container is not running"; docker logs lanscape-arm-test; exit 1)
          echo "ARM64 container started successfully"
          docker stop lanscape-arm-test
