name: Release - Docker Publish

on:
  workflow_call:
    inputs:
      version:
        description: "Version tag for the Docker image"
        required: true
        type: string
      is_prerelease:
        description: "Whether this is a pre-release version"
        required: false
        type: string
        default: "false"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.version }}
            type=raw,value=latest,enable=${{ inputs.is_prerelease != 'true' }}

      - name: Wait for PyPI availability
        run: |
          echo "Waiting for lanscape==${{ inputs.version }} to be available on PyPI..."
          for i in {1..30}; do
            if pip index versions lanscape 2>/dev/null | grep -q "${{ inputs.version }}"; then
              echo "Version ${{ inputs.version }} is available on PyPI"
              exit 0
            fi
            echo "Attempt $i/30: Not yet available, waiting 10s..."
            sleep 10
          done
          echo "Warning: Version may not be available yet, proceeding anyway"

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ inputs.version }}
